spring.application.name=rowoon

# MySQL — 모든 접속 정보는 .env 파일 또는 환경변수로 주입
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/project?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&characterSetResults=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=org.study.cafe.board.vo,org.study.cafe.member.vo,org.study.cafe.menu.vo,org.study.cafe.membership.vo,org.study.cafe.chat.vo

# JSP
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# 인코딩
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Groq AI API — 키는 .env 파일의 GROQ_API_KEY 로 주입
groq.api.key=${GROQ_API_KEY:}

# Logging
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.org.springframework.web.servlet.view=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.study.cafe=DEBUG
