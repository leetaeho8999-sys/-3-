spring.application.name=rowoon

# MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/project?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=dbuser
spring.datasource.password=1234

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=org.study.cafe.board.vo,org.study.cafe.member.vo,org.study.cafe.menu.vo,org.study.cafe.membership.vo,org.study.cafe.chat.vo
mybatis.configuration.map-underscore-to-camel-case=true

# JSP
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
spring.mvc.static-path-pattern=/resources/**
spring.web.resources.static-locations=/resources/

# 인코딩
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 이메일 인증 (Gmail SMTP — 앱 비밀번호 필요)
# Google 계정 → 보안 → 2단계 인증 → 앱 비밀번호에서 발급
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_gmail@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Groq AI API
groq.api.key=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

# Logging - 요청 URL, 뷰 해석, 오류 원인 출력
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.org.springframework.web.servlet.view=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.study.cafe=DEBUG

# 롬복(Lombok) 설정
spring.main.allow-bean-definition-overriding=true