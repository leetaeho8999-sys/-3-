spring.application.name=rowoon

# MySQL
# DB 접속 정보는 환경변수(.env 또는 OS 환경변수)로 주입. 미설정 시 : 뒤의 기본값 사용 (로컬 개발용).
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/project?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&characterSetResults=UTF-8}
spring.datasource.username=${DB_USERNAME:dbuser1}
spring.datasource.password=${DB_PASSWORD:1234}

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=org.study.cafe.board.vo,org.study.cafe.member.vo,org.study.cafe.menu.vo,org.study.cafe.membership.vo,org.study.cafe.chat.vo,org.study.cafe.order.vo,org.study.cafe.visit.vo

# JSP
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp



# 인코딩
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 파일 업로드 저장 디렉토리 (게시판 첨부 등)
# - dev/local : 기본값 ./uploads (프로젝트 루트 기준)
# - 운영/Docker : 환경변수 APP_UPLOAD_DIR 로 절대 경로 주입 (예: /app/uploads)
app.upload.dir=${APP_UPLOAD_DIR:./uploads}
app.upload.url-prefix=/resources/upload

# TossPayments — 개발/테스트용 공용 테스트 키 직접 입력
# 프로덕션 배포 시: 환경변수 TOSS_CLIENT_KEY / TOSS_SECRET_KEY 로 교체하거나 .env 파일 사용
toss.client-key=test_ck_D5GePWvyJnrK0W0k6q8gLzN97Eoq
toss.secret-key=test_sk_zXLkKEypNArWmo50nX3lmeaxYG5R

# Groq AI API — 키는 .env 의 GROQ_API_KEY 로 주입 (평문 하드코딩 제거)
groq.api.key=${GROQ_API_KEY:}

# Logging - 요청 URL, 뷰 해석, 오류 원인 출력
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.org.springframework.web.servlet.view=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.study.cafe=DEBUG
